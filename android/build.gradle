plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.vungle'
version = '0.1.0'

android {
  namespace "expo.modules.vungle"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
    consumerProguardFiles 'proguard-rules.pro'
  }
}

dependencies {
  implementation 'com.vungle:vungle-ads:7.7.2'
}
